<!-- Enhanced Open Graph / LinkedIn meta tags -->
{{- if .IsPage }}
<meta property="og:type" content="article" />
<meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}" />
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}" />{{ end }}
{{ with .PublishDate }}<meta property="article:published_time" content="{{ .Format "2006-01-02T15:04:05Z07:00" }}" />{{ end }}
{{ with .Lastmod }}<meta property="article:modified_time" content="{{ .Format "2006-01-02T15:04:05Z07:00" }}" />{{ end }}
{{ with .Params.Categories }}<meta property="article:section" content="{{ index . 0 }}" />{{ end }}
{{ range .Params.Tags }}<meta property="article:tag" content="{{ . }}" />{{ end }}

<!-- Twitter Card tags -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ .Title }}" />
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Summary | truncate 160 }}{{ end }}" />
{{ with .Params.image }}<meta name="twitter:image" content="{{ . | absURL }}" />{{ end }}

{{- else }}
<meta property="og:type" content="website" />
<meta property="og:title" content="{{ .Site.Title }}" />
<meta property="og:description" content="{{ .Site.Params.description }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
{{ with .Site.Params.images }}<meta property="og:image" content="{{ index . 0 | absURL }}" />{{ end }}

<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="{{ .Site.Title }}" />
<meta name="twitter:description" content="{{ .Site.Params.description }}" />
{{- end }}

<!-- Author meta -->
<meta name="author" content="{{ .Site.Params.author }}" />

<!-- LinkedIn specific -->
<meta property="og:locale" content="en_US" />

<!-- Plausible Analytics -->
<script defer data-domain="gordonburgett.net" src="https://plausible.io/js/script.js"></script>
