{{- define "main" }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">
      {{ .Title }}
    </h1>
    {{- if .Description }}
    <div class="post-description">
      {{ .Description }}
    </div>
    {{- end }}
  </header>

  <div class="post-content contact-form-container">
    {{- if .Content }}
    {{ .Content }}
    {{- end }}

    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form" id="contact-form">
      <input type="hidden" name="access_key" value="ac2c3f76-ff83-4ee4-9732-d7eaa11f143e">
      <input type="hidden" name="redirect" value="{{ .Site.BaseURL }}contact/thanks/">
      <input type="hidden" name="subject" value="New contact from {{ .Site.Title }}">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Your message..." rows="6"></textarea>
      </div>

      <div class="h-captcha" data-captcha="true"></div>

      <button type="submit" class="contact-submit">Send Message</button>
    </form>
  </div>

  <footer class="post-footer"></footer>
</article>

<script src="https://web3forms.com/client/script.js" async defer></script>

{{- end }}
