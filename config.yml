baseURL: http://www.gordonburgett.net
languageCode: en-us
title: Gordon Burgett | Director of Software Engineering, Albers Aerospace
theme: PaperMod
copyright: All content © Gordon Burgett, 2014-2026

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# Sitemap configuration for Google Search Console
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Gordon Burgett
  description: "Director of Software Engineering, Albers Aerospace"
  keywords:
    [Software Engineering, Technical Leadership, AI, Development, Architecture]
  author: Gordon Burgett
  images: ["/images/headshot.jpg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # Profile Image
  profileImage: "/images/headshot.jpg"

  # Home Page Info
  homeInfoParams:
    Title: "Gordon Burgett"
    Content: |
      Director of Software Engineering, Albers Aerospace
      Director, HealthShare Technology Solutions

      Engineering Leader with 15+ years of Software Engineering expertise.
      Currently leading AI workflow transformation at Albers Aerospace.

      In my spare time, I enjoy helping churches navigate the complexities of healthcare cost-sharing ministries such as CHM (Christian Healthcare Ministries).

      [Let's build something together →](https://albers.engineering/capabilities/software)

  socialIcons:
    - name: github
      url: "https://github.com/gburgett"
    - name: linkedin
      url: "https://www.linkedin.com/in/gordonburgett"
    - name: email
      url: "/contact/"

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # Open Graph / Twitter Card
  assets:
    disableHLJS: true # Use Hugo's built-in syntax highlighting

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  # Capabilities section
  capabilities:
    enable: true
    title: "Core Capabilities"
    items:
      - category: "AI/ML Engineering"
        items:
          - "Full-lifecycle AI workflow integration and deployment"
          - "Large Language Model (LLM) implementation and optimization"
          - "ML pipeline architecture and automation"
          - "Custom AI solution development for mission-critical systems"

      - category: "Systems Architecture"
        items:
          - "Distributed systems design and implementation"
          - "Microservices and cloud-native architecture"
          - "API design and integration"
          - "Performance optimization and scalability"

      - category: "Technical Leadership"
        items:
          - "Cross-functional team leadership and mentorship"
          - "AI transformation in Software Engineering"
          - "Agile/DevOps process"
          - "Vendor evaluation and technology selection"

      - category: "Technology Stack"
        items:
          - "Languages: Go, Rust, TypeScript, C#/.NET"
          - "Cloud: AWS, Azure, containerization (Docker/Kubernetes)"
          - "Databases: PostgreSQL, MongoDB, Redis"
          - "Actor model for high-throughput systems"

  # Projects section (hugo-profile compatibility)
  projects:
    enable: true
    title: "Featured Projects"

  # Static path for assets (hugo-profile compatibility)
  staticPath: ""

  # Legacy params for backwards compatibility
  AuthorName: Gordon
  github: gburgett
  email: gordon@gordonburgett.net

languages:
  en:
    languageName: English
    weight: 1
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /posts/
          weight: 1
        - identifier: projects
          name: Projects
          title: Projects
          url: /projects/
          weight: 2
        - identifier: albania
          name: Albania
          title: Albania mission work
          url: /albania/
          weight: 3
        - identifier: archive
          name: Archive
          title: Archive
          url: /archive/
          weight: 4
        - identifier: search
          name: Search
          url: /search/
          weight: 5

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    style: monokai

outputs:
  home:
    - HTML
    - RSS
    - JSON

# Preserve custom taxonomies
indexes:
  category: categories
  tag: tags
